<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1b2f5e"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </radialGradient>
    <!-- Accent glow -->
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4a9eff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c040" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f0c040" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip to circle -->
    <clipPath id="circle">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
    <!-- Board grid clip -->
    <clipPath id="boardClip">
      <rect x="112" y="148" width="288" height="230" rx="10"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#circle)">

    <!-- Background -->
    <rect width="512" height="512" fill="url(#bgGrad)"/>

    <!-- Subtle grid pattern -->
    <g opacity="0.06" stroke="#4a9eff" stroke-width="1">
      <line x1="0" y1="85"  x2="512" y2="85"/>
      <line x1="0" y1="170" x2="512" y2="170"/>
      <line x1="0" y1="255" x2="512" y2="255"/>
      <line x1="0" y1="340" x2="512" y2="340"/>
      <line x1="0" y1="425" x2="512" y2="425"/>
      <line x1="85"  y1="0" x2="85"  y2="512"/>
      <line x1="170" y1="0" x2="170" y2="512"/>
      <line x1="255" y1="0" x2="255" y2="512"/>
      <line x1="340" y1="0" x2="340" y2="512"/>
      <line x1="425" y1="0" x2="425" y2="512"/>
    </g>

    <!-- Glow blobs -->
    <ellipse cx="200" cy="200" rx="180" ry="180" fill="url(#glowBlue)"/>
    <ellipse cx="320" cy="320" rx="140" ry="140" fill="url(#glowGold)"/>

    <!-- ── Clipboard body ── -->
    <rect x="112" y="148" width="288" height="230" rx="14" fill="#0f1e3a" stroke="#2a4a8a" stroke-width="2" filter="url(#shadow)"/>

    <!-- Clipboard top bar (header) -->
    <rect x="112" y="148" width="288" height="44" rx="14" fill="#1a3a6e"/>
    <rect x="112" y="172" width="288" height="20" fill="#1a3a6e"/>

    <!-- Clip at top -->
    <rect x="214" y="132" width="84" height="26" rx="8" fill="#1a3a6e" stroke="#2a4a8a" stroke-width="2"/>
    <rect x="230" y="138" width="52" height="12" rx="4" fill="#0a1428"/>

    <!-- Header text area -->
    <rect x="136" y="158" width="110" height="8" rx="4" fill="#4a9eff" opacity="0.7"/>
    <rect x="136" y="170" width="70"  height="5" rx="3" fill="#4a9eff" opacity="0.3"/>

    <!-- Calendar icon in header -->
    <rect x="348" y="156" width="32" height="28" rx="4" fill="#4a9eff" opacity="0.15" stroke="#4a9eff" stroke-width="1.5"/>
    <line x1="354" y1="160" x2="354" y2="153" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
    <line x1="374" y1="160" x2="374" y2="153" stroke="#4a9eff" stroke-width="2" stroke-linecap="round"/>
    <line x1="348" y1="165" x2="380" y2="165" stroke="#4a9eff" stroke-width="1.5" opacity="0.5"/>
    <rect x="353" y="169" width="5" height="5" rx="1" fill="#4a9eff" opacity="0.7"/>
    <rect x="363" y="169" width="5" height="5" rx="1" fill="#4a9eff" opacity="0.7"/>
    <rect x="363" y="178" width="5" height="5" rx="1" fill="#f0c040" opacity="0.9"/>

    <!-- ── Table grid ── -->
    <!-- Row lines -->
    <g clip-path="url(#boardClip)" stroke="#1e3a6e" stroke-width="1">
      <line x1="112" y1="210" x2="400" y2="210"/>
      <line x1="112" y1="240" x2="400" y2="240"/>
      <line x1="112" y1="270" x2="400" y2="270"/>
      <line x1="112" y1="300" x2="400" y2="300"/>
      <line x1="112" y1="330" x2="400" y2="330"/>
      <!-- Col lines -->
      <line x1="190" y1="192" x2="190" y2="378"/>
      <line x1="248" y1="192" x2="248" y2="378"/>
      <line x1="306" y1="192" x2="306" y2="378"/>
      <line x1="354" y1="192" x2="354" y2="378"/>
    </g>

    <!-- Column headers (days) -->
    <g font-family="Arial" font-size="9" font-weight="700" fill="#4a9eff" opacity="0.7" text-anchor="middle">
      <text x="151" y="206">א׳</text>
      <text x="219" y="206">ב׳</text>
      <text x="277" y="206">ג׳</text>
      <text x="330" y="206">ד׳</text>
      <text x="378" y="206">ה׳</text>
    </g>

    <!-- Row labels (systems) -->
    <g font-family="Arial" font-size="7" fill="#8892b0" text-anchor="middle">
      <text x="149" y="231">מערכת א׳</text>
      <text x="149" y="261">מערכת ב׳</text>
      <text x="149" y="291">מערכת ג׳</text>
      <text x="149" y="321">מערכת ד׳</text>
    </g>

    <!-- Assignment chips — colored blocks in cells -->
    <!-- Row 1 -->
    <rect x="196" y="215" width="44" height="18" rx="4" fill="#27ae60" opacity="0.85"/>
    <rect x="254" y="215" width="44" height="18" rx="4" fill="#27ae60" opacity="0.85"/>
    <rect x="360" y="215" width="36" height="18" rx="4" fill="#2980b9" opacity="0.85"/>
    <!-- Row 2 -->
    <rect x="196" y="245" width="44" height="18" rx="4" fill="#8e44ad" opacity="0.85"/>
    <rect x="312" y="245" width="34" height="18" rx="4" fill="#c0392b" opacity="0.8"/>
    <rect x="360" y="245" width="36" height="18" rx="4" fill="#27ae60" opacity="0.85"/>
    <!-- Row 3 -->
    <rect x="254" y="275" width="44" height="18" rx="4" fill="#e67e22" opacity="0.85"/>
    <rect x="312" y="275" width="34" height="18" rx="4" fill="#2980b9" opacity="0.85"/>
    <!-- Row 4 -->
    <rect x="196" y="305" width="44" height="18" rx="4" fill="#27ae60" opacity="0.85"/>
    <rect x="254" y="305" width="44" height="18" rx="4" fill="#8e44ad" opacity="0.85"/>
    <rect x="360" y="305" width="36" height="18" rx="4" fill="#e67e22" opacity="0.85"/>

    <!-- Small person dots in chips -->
    <g fill="#fff" opacity="0.6" font-family="Arial" font-size="6">
      <text x="218" y="227">דוד</text>
      <text x="276" y="227">רחל</text>
      <text x="370" y="227">יוסי</text>
      <text x="218" y="257">אמיר</text>
      <text x="323" y="257">נועה</text>
      <text x="370" y="257">שירה</text>
      <text x="276" y="287">רון</text>
      <text x="320" y="287">תמר</text>
      <text x="218" y="317">עידו</text>
      <text x="270" y="317">מיכל</text>
    </g>

    <!-- ── Gold checkmark badge (bottom right of board) ── -->
    <circle cx="382" cy="358" r="24" fill="#0a0f1e" stroke="#f0c040" stroke-width="2.5" filter="url(#shadow)"/>
    <polyline points="371,358 379,366 393,350" fill="none" stroke="#f0c040" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- ── Bottom label ── -->
    <text x="256" y="424" font-family="Arial, sans-serif" font-size="22" font-weight="900"
          fill="#e2e8f0" text-anchor="middle" letter-spacing="1">לוח שיבוצים</text>
    <text x="256" y="448" font-family="Arial, sans-serif" font-size="12"
          fill="#4a9eff" text-anchor="middle" opacity="0.8" letter-spacing="2">ASSIGNMENTS</text>

    <!-- Decorative bottom line -->
    <rect x="196" y="458" width="120" height="2" rx="1" fill="#4a9eff" opacity="0.4"/>

    <!-- Outer ring -->
    <circle cx="256" cy="256" r="252" fill="none" stroke="#2a4a8a" stroke-width="2" opacity="0.6"/>
    <circle cx="256" cy="256" r="248" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.2"/>

  </g>
</svg>
